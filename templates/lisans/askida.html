<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sistem Askıya Alındı</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a1628; color:#e2e8f0; font-family:'Segoe UI',sans-serif;
    display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .kart { background:#111d33; border:1px solid #1e3a5f; border-radius:16px;
    padding:48px 40px; max-width:460px; width:90%; text-align:center; }
  .ikon { font-size:56px; margin-bottom:20px; }
  h1 { font-size:22px; font-weight:700; color:#f87171; margin-bottom:12px; }
  p { font-size:14px; color:#94a3b8; line-height:1.7; margin-bottom:8px; }
  .iletisim { margin-top:28px; padding:16px; background:#0a1628;
    border-radius:10px; font-size:13px; color:#64748b; }
</style>
</head>
<body>
<div class="kart">
  <div class="ikon">🔒</div>
  <h1>Sistem Geçici Olarak Askıya Alındı</h1>
  <p>Bu sisteme şu an erişim sağlanamamaktadır.</p>
  <p>Verileriniz güvende ve korunmaktadır.</p>
  <div class="iletisim">
    Erişim için lütfen sistem yöneticinizle iletişime geçin.
  </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Demo Süresi Doldu</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a1628; color:#e2e8f0; font-family:'Segoe UI',sans-serif;
    display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .kart { background:#111d33; border:1px solid #1e3a5f; border-radius:16px;
    padding:48px 40px; max-width:480px; width:90%; text-align:center; }
  .ikon { font-size:56px; margin-bottom:20px; }
  h1 { font-size:22px; font-weight:700; color:#f59e0b; margin-bottom:12px; }
  p { font-size:14px; color:#94a3b8; line-height:1.7; margin-bottom:8px; }
  .bilgi { margin-top:24px; padding:20px; background:#0a1628;
    border-radius:10px; border-left:3px solid #f59e0b; text-align:left; }
  .bilgi p { font-size:13px; color:#94a3b8; margin-bottom:6px; }
  .bilgi strong { color:#e2e8f0; }
</style>
</head>
<body>
<div class="kart">
  <div class="ikon">⏰</div>
  <h1>Demo Süreniz Doldu</h1>
  <p>3 günlük ücretsiz deneme süreniz sona erdi.</p>
  <p>Verileriniz güvende ve korunmaktadır.</p>
  <div class="bilgi">
    <p>Kullanıma devam etmek için:</p>
    <p><strong>Sistem yöneticinizle iletişime geçin.</strong></p>
    <p style="margin-top:12px;font-size:12px;color:#64748b">
      Lisans aktivasyonu sonrası tüm verilerinize erişiminiz geri kazanılacaktır.
    </p>
  </div>
</div>
</body>
</html>

{% extends "base.html" %}
{% set active = "sifre-degistir" %}
{% block title %}Şifremi Değiştir — Otel Leo{% endblock %}
{% block page_title %}Şifremi Değiştir{% endblock %}

{% block content %}
<div class="panel" style="max-width:420px">
  {% if hata %}
  <div style="background:#3a1a1a;border:1px solid var(--accent3);color:var(--accent3);padding:10px 14px;border-radius:7px;margin-bottom:16px;font-size:13px">⚠️ {{ hata }}</div>
  {% endif %}
  {% if basari %}
  <div style="background:#123a26;border:1px solid var(--pos);color:var(--pos);padding:10px 14px;border-radius:7px;margin-bottom:16px;font-size:13px">✅ {{ basari }}</div>
  {% endif %}

  <form method="POST" action="/sifre-degistir">
    <div style="margin-bottom:16px">
      <label style="display:block;font-size:12px;color:var(--text2);font-weight:600;margin-bottom:6px">Mevcut Şifre</label>
      <input type="password" name="mevcut_sifre" required style="width:100%;background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:7px;font-size:14px;outline:none">
    </div>
    <div style="margin-bottom:16px">
      <label style="display:block;font-size:12px;color:var(--text2);font-weight:600;margin-bottom:6px">Yeni Şifre</label>
      <input type="password" name="yeni_sifre" required minlength="6" style="width:100%;background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:7px;font-size:14px;outline:none">
    </div>
    <div style="margin-bottom:22px">
      <label style="display:block;font-size:12px;color:var(--text2);font-weight:600;margin-bottom:6px">Yeni Şifre (Tekrar)</label>
      <input type="password" name="yeni_sifre_tekrar" required minlength="6" style="width:100%;background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:7px;font-size:14px;outline:none">
    </div>
    <button type="submit" style="width:100%;background:var(--accent2);color:#0d1117;border:none;padding:12px;border-radius:7px;font-size:14px;font-weight:700;cursor:pointer">Şifreyi Güncelle</button>
  </form>
</div>
{% endblock %}
